<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lixie | CV Studio33 Intelligence Agency</title>
    <style>
        /* ================= ESTILOS BASE Y VARIABLES ================= */
        :root {
            --bg-dark: #07070a;
            --bg-panel: rgba(20, 20, 29, 0.75);
            --accent-cyan: #00f0ff;
            --accent-cyan-glow: rgba(0, 240, 255, 0.4);
            --accent-purple: #7000ff;
            --text-main: #e8e8e8;
            --text-muted: #9aa0a6;
            --font-main: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* Importar fuente moderna */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* Soporte dinámico para móviles */
            /* Fondo cibernético/corporativo */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(112, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #050508 100%);
            overflow: hidden;
        }

        /* Efecto de líneas de escaneo (Scanlines) sutil */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* ================= CONTENEDOR PRINCIPAL (GLASSMORPHISM) ================= */
        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 240, 255, 0.05);
            overflow: hidden;
            position: relative;
            z-index: 2;
            animation: containerGlow 4s ease-in-out infinite alternate, slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Línea superior brillante */
        #chat-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            z-index: 10;
        }

        /* ================= CABECERA ================= */
        #chat-header {
            padding: 18px 24px;
            background: rgba(10, 10, 15, 0.6);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan-glow);
            object-fit: cover;
            padding: 2px;
            background: var(--bg-dark);
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: scale(1.05);
        }

        .header-info h2 {
            margin: 0 0 4px 0;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.75rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulse 1.5s infinite;
        }

        /* Selector de Nodos y Tooltip */
        .node-selector-container {
            text-align: right;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }
        
        /* Botón de volver al inicio */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--text-main);
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .back-home-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--accent-cyan);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-cyan-glow);
            transform: translateY(-1px);
        }
        
        .node-header-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }

        .node-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-icon {
            color: var(--accent-purple);
            font-size: 0.7rem;
            cursor: help;
            border: 1px solid var(--accent-purple);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .info-icon:hover {
            background: var(--accent-purple);
            color: #fff;
            box-shadow: 0 0 10px rgba(112, 0, 255, 0.5);
        }

        /* Tooltip de explicación de Nodos */
        .tooltip-text {
            visibility: hidden;
            width: 200px;
            background-color: rgba(10, 10, 15, 0.95);
            color: #ccc;
            text-align: left;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 100;
            top: 100%;
            right: 0;
            font-size: 0.7rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(5px);
            line-height: 1.4;
        }
        .node-header-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        #node-selector {
            background: rgba(0, 0, 0, 0.5);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.70rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        #node-selector:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan-glow);
        }

        /* ================= ÁREA DE MENSAJES ================= */
        #messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            perspective: 1000px;
        }

        #messages-area::-webkit-scrollbar { width: 6px; }
        #messages-area::-webkit-scrollbar-track { background: transparent; }
        #messages-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        #messages-area::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.3); }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
            transform-style: preserve-3d;
        }

        .message-wrapper.lixie { align-self: flex-start; }
        .message-wrapper.user { align-self: flex-end; }

        .message {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateZ(0);
        }

        .message:hover {
            transform: translateZ(15px) translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .lixie .message {
            background: rgba(30, 30, 45, 0.6);
            color: #eaeaea;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(112, 0, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .user .message {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15) 0%, rgba(0, 240, 255, 0.05) 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.05);
        }

        .message b { color: var(--accent-cyan); font-weight: 600; }
        .message ul { padding-left: 20px; margin: 8px 0; }
        .message li { margin-bottom: 6px; }
        .message li::marker { color: var(--accent-purple); }

        /* ========= BOTONES DE ACCIÓN (ENLACES MARKDOWN) ========= */
        .action-btn {
            display: block;
            margin: 12px 0 4px 0;
            padding: 10px 15px;
            background: linear-gradient(90deg, rgba(112, 0, 255, 0.2), rgba(0, 240, 255, 0.1));
            border: 1px solid var(--accent-cyan);
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }
        .action-btn:hover {
            background: linear-gradient(90deg, rgba(112, 0, 255, 0.4), rgba(0, 240, 255, 0.3));
            box-shadow: 0 0 20px var(--accent-cyan-glow);
            transform: translateY(-2px);
            color: #fff;
        }

        .read-receipt {
            font-size: 0.65rem;
            color: var(--accent-cyan);
            align-self: flex-end;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
            animation: fadeIn 0.5s ease-in forwards;
        }

        /* ================= FAQS ================= */
        #faq-container {
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            border-top: 1px solid var(--glass-border);
            scrollbar-width: none;
            background: rgba(10, 10, 15, 0.4);
            scroll-behavior: smooth;
        }
        #faq-container::-webkit-scrollbar { display: none; }

        .faq-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(112, 0, 255, 0.4);
            color: #d1d1d1;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: var(--font-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        .faq-btn:hover {
            background: rgba(112, 0, 255, 0.25);
            border-color: var(--accent-cyan);
            color: #fff;
            transform: translateY(-2px) scale(1.05); 
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
        }

        @media (min-width: 481px) {
            #faq-container {
                scrollbar-width: thin;
                scrollbar-color: var(--accent-cyan) rgba(255,255,255,0.05);
                padding-bottom: 16px; 
            }
            #faq-container::-webkit-scrollbar {
                display: block;
                height: 6px;
            }
            #faq-container::-webkit-scrollbar-track {
                background: rgba(255,255,255,0.05);
                border-radius: 10px;
            }
            #faq-container::-webkit-scrollbar-thumb {
                background: var(--accent-cyan);
                border-radius: 10px;
            }
            #faq-container::-webkit-scrollbar-thumb:hover {
                background: var(--accent-purple);
            }
        }

        /* ================= INPUT ================= */
        #input-area {
            padding: 18px 24px;
            padding-bottom: max(18px, env(safe-area-inset-bottom));
            background: rgba(10, 10, 15, 0.8);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: var(--font-main);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        #user-input:focus { 
            border-color: var(--accent-cyan); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 2px 4px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-1px);
        }
        #user-input::placeholder { color: #555; transition: color 0.3s; }
        #user-input:focus::placeholder { color: #888; }
        #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

        #send-btn {
            background: var(--accent-cyan);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            color: var(--bg-dark);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 0 rgba(0, 160, 180, 1), 0 5px 10px rgba(0,0,0,0.3);
            transform: translateY(0);
        }
        #send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 160, 180, 1), 0 8px 20px var(--accent-cyan-glow);
            background: #fff;
        }
        #send-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0, 160, 180, 1), 0 2px 5px rgba(0,0,0,0.3);
        }
        #send-btn:disabled {
            background: #444;
            color: #888;
            box-shadow: 0 4px 0 #222;
            cursor: not-allowed;
            transform: none;
        }
        #send-btn svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.3s; }
        #send-btn:hover:not(:disabled) svg { transform: translateX(2px) translateY(-2px); }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.95) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-cyan); } 50% { opacity: 1; box-shadow: 0 0 15px var(--accent-cyan); } 100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-cyan); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.8; } }
        @keyframes containerGlow { from { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 240, 255, 0.05); } to { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(112, 0, 255, 0.15); } }

        .typing { display: flex; gap: 6px; padding: 12px 8px; align-items: center; justify-content: center; }
        .typing .bar { width: 5px; height: 16px; background: var(--accent-cyan); border-radius: 3px; animation: cyberWave 1.2s infinite ease-in-out; box-shadow: 0 0 5px var(--accent-cyan-glow); }
        .typing .bar:nth-child(1) { animation-delay: -0.4s; }
        .typing .bar:nth-child(2) { animation-delay: -0.2s; background: var(--accent-purple); box-shadow: 0 0 5px rgba(112, 0, 255, 0.5); }
        .typing .bar:nth-child(3) { animation-delay: 0s; }
        @keyframes cyberWave { 0%, 40%, 100% { transform: scaleY(0.4); opacity: 0.3; } 20% { transform: scaleY(1.2); opacity: 1; } }

        @media (max-width: 480px) {
            #chat-container { 
                height: 100dvh; 
                max-width: 100%; 
                border-radius: 0; 
                border: none; 
                animation: none; 
            }
            .header-info h2 { font-size: 1rem; }
            .message { font-size: 0.9rem; padding: 12px 14px; }
            #input-area { 
                padding: 12px 16px;
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
            #user-input { padding: 12px 16px; font-size: 16px; }
        }
    </style>
</head>

    // 3. OBTENER API KEY DE FIRESTORE
    async function loadApiKey(node) {
        try {
            const docRef = doc(db, "chatbotcv", documentId);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const fetchedKey = docSnap.data()[node];
                if (fetchedKey) {
                    currentApiKey = fetchedKey;
                    console.log(`Conexión establecida con el nodo: ${node}`);
                }
            } else {
                console.error("No se encontró el documento IDCV.");
            }
        } catch (error) {
            console.error("Error obteniendo la llave:", error);
            addMessage("Lixie", "Fallo de conexión en la Mente Colmena. Por favor, selecciona otro Nodo de conexión.");
        }
    }

    // Inicializamos el servidor
    loadApiKey("key1");
    document.getElementById("node-selector").addEventListener("change", (e) => loadApiKey(e.target.value));

    // 4. LÓGICA DE INTERFAZ Y CHAT
    const messagesArea = document.getElementById("messages-area");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

        btn.onclick = () => { userInput.value = faq; handleSend(); };

    function formatText(text) {
        let formatted = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" class="action-btn">$1</a>');
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        formatted = formatted.replace(/\*(.*?)\*/g, '<i>$1</i>');
        formatted = formatted.replace(/^- (.*)$/gm, '<li>$1</li>');
        if (formatted.includes('<li>')) {
            formatted = formatted.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        }
        return formatted.replace(/\n/g, '<br>');
    }

    function addMessage(sender, text) {
        const wrapper = document.createElement("div");
        wrapper.className = `message-wrapper ${sender.toLowerCase()}`;
        
        const bubble = document.createElement("div");
        bubble.className = "message";
        bubble.innerHTML = sender === "Lixie" ? formatText(text) : text;
        
        wrapper.appendChild(bubble);

        if (sender === "User") {
            const receipt = document.createElement("div");
            receipt.className = "read-receipt";
            receipt.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Recibido en Colmena`;
            wrapper.appendChild(receipt);
        }

        messagesArea.appendChild(wrapper);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTyping() {
        const wrapper = document.createElement("div");
        wrapper.className = "message-wrapper lixie typing-indicator";
        wrapper.id = "typing";
        wrapper.innerHTML = `<div class="message"><div class="typing"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>`;
        messagesArea.appendChild(wrapper);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById("typing");
        if (typing) typing.remove();
    }

    // 5. LLAMADA A GEMINI API 
    async function handleSend() {
        const text = userInput.value.trim();
        if (!text || !currentApiKey) return;

        // Bloqueo de UI 
        sendBtn.disabled = true;
        userInput.disabled = true;

        addMessage("User", text);
        userInput.value = "";
        showTyping();

        // ALMACENANDO EN MEMORIA 
        chatHistory.push({ role: "user", parts: [{ text: text }] });

        let promptContents = [...chatHistory];

        // CORRECCIÓN 2: El recorte debe ser de un NÚMERO IMPAR (-3). 
        // Si usamos -2, la memoria empieza con un mensaje de la IA ("model") y Gemini colapsa arrojando Error 400.
        if (promptContents.length > 3) {
            promptContents = promptContents.slice(-3);
        }

        const finalPrompt = {
            system_instruction: { parts: [{ text: systemPrompt }] },
            contents: promptContents,
            generationConfig: {
                maxOutputTokens: 250,
                temperature: 0.7
            }
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b-latest:generateContent?key=${currentApiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(finalPrompt)
            });

            // MANEJO DE ERROR 429: RECARGA SILENCIOSA
            if (response.status === 429) {
                setTimeout(() => {
                    window.location.reload();
                }, 33000); 
                return; 
            }

            const data = await response.json();
            removeTyping();

            // MANEJO DE ERRORES GENERALES
            if (!response.ok || data.error) {
                const errorMsg = data.error ? data.error.message.toLowerCase() : "";
                if (response.status >= 500 || errorMsg.includes("quota") || response.status === 403) {
                    throw new Error("API_ERROR");
                } else {
                    throw new Error("WEB_ERROR");
                }
            }

            const aiResponse = data.candidates[0].content.parts[0].text;
            addMessage("Lixie", aiResponse);
            
            // GUARDANDO RESPUESTA EN MEMORIA
            chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

        } catch (error) {
            removeTyping();
            
            // CORRECCIÓN 3: Si hay error, quitamos tu mensaje de la memoria para no corromper la secuencia.
            chatHistory.pop(); 
            
            if (error.message === "API_ERROR") {
                addMessage("Lixie", "Servidores de cvstudio33 en mantenimiento, Regrese en 5 minutos.");
            } else {
                addMessage("Lixie", "Nuestra web se encuentra con dificultades en estos momentos, Inténtelo más tarde.");
            }
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener("click", handleSend);
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSend();
    });

    // Bienvenida inicial
    setTimeout(() => {
        addMessage("Lixie", "Saludos. Soy **Lixie**, la interfaz de la Mente Colmena de **CV Studio33**.\n\nLa búsqueda de empleo tradicional está obsoleta. ¿Estás listo para iniciar tu asalto digital y asegurar tu próximo puesto?");
    }, 800);
